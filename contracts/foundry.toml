[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "forge-std/=lib/forge-std/src/",
]
via_ir = true
optimizer = true
optimizer_runs = 200

# Mantle Sepolia Testnet chain config (for verification)
[etherscan]
MantleSepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.mantlescan.xyz/api", chain = "5003" }

# RPC endpoints (for scripting)
[rpc_endpoints]
mantle = "https://rpc.mantle.xyz"
mantleSepolia = "https://rpc.sepolia.mantle.xyz"
